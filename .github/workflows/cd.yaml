name: CD

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. Set up pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - name: 4. Build UI Manually
        working-directory: ui
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: 5. Fix Permissions
        run: chmod +x gradlew

      - name: 6. Build Backend
        run: |
          ./gradlew re -x test -x :ui:pnpmInstall -x :ui:pnpmSetup -x :ui:nodeSetup

      - name: 7. Push to Halo App Store
        # 修正后的 Action 地址
        uses: halo-sigs/appstore-promote@v1
        with:
          app-id: "ion2qhko"
          # 确保这里的路径指向生成的 jar 包
          app-file: "build/libs/*.jar"
          api-token: ${{ secrets.HALO_PAT }}