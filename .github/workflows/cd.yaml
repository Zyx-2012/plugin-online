name: CD

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 配置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. 配置 pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - name: 4. 手动编译前端 UI (绝对路径，防报错)
        working-directory: ui
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: 5. 编译后端 (使用你的 re 命令，并屏蔽官方 UI 任务)
        run: |
          chmod +x gradlew
          ./gradlew re -x test -x :ui:pnpmInstall -x :ui:pnpmSetup -x :ui:nodeSetup

      - name: 6. 推送到 Halo 应用市场
        uses: halo-sigs/appstore-release-action@v1
        with:
          app-id: "ion2qhko"
          app-file: "build/libs/*.jar" 
          api-token: ${{ secrets.HALO_PAT }}