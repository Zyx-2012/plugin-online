name: CD

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 3. Set up pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - name: 4. Build UI Manually
        # 这里强制进入 ui 目录，并使用 pnpm 10 编译
        working-directory: ui
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: 5. Fix Permissions (FORCE)
        # 这是解决 126 错误的关键：不等 Git，自己动手
        run: chmod +x gradlew

      - name: 6. Build Backend (Your Command)
        # 使用你本地熟悉的命令，并排除掉 Gradle 插件自带的 UI 任务防止冲突
        run: |
          ./gradlew re -x test -x :ui:pnpmInstall -x :ui:pnpmSetup -x :ui:nodeSetup

      - name: 7. Push to Halo App Store
        # 使用独立的发布 Action，不再依赖封装好的工作流
        uses: halo-sigs/appstore-release-action@v1
        with:
          app-id: "ion2qhko"
          app-file: "build/libs/*.jar"
          api-token: ${{ secrets.HALO_PAT }}