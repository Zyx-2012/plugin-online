apiVersion: v1alpha1
kind: Setting
metadata:
  name: online-settings
spec:
  forms:
    - group: basic
      label: 基础设置
      formSchema:
        - $formkit: number
          name: clean_session_time
          value: 600
          label: 会话失活时间
          help: 服务端超过该秒数未收到心跳后会清理失活会话。单位：秒
          validation: required|number|min:30

        - $formkit: checkbox
          name: expose_detail_paths
          value: false
          label: 公开详细路径
          help: 该选项已废弃，现已更改为非脱敏。预计在未来专门优化

        - $formkit: number
          name: refresh_rate
          value: 10
          label: 控制台刷新率
          help: 后台看板主动拉取一次最新数据的时间间隔。单位：秒
          validation: required|number|min:3|max:120

        - $formkit: textarea
          name: origin_whitelist
          value: ""
          label: WebSocket 来源白名单
          help: |
            允许连接在线统计 WebSocket 的来源白名单。
            支持每行一条或英文逗号分隔。
            支持以下写法：
            域名：blog.example.com ；
            泛域名：*.example.com ；
            IP：192.168.1.10 ；
            带端口：192.168.1.10:8090 ；
            完整来源：http://192.168.1.10:8090 ；
            全部放行：* 。
            留空时仅放行内置默认值：localhost、127.0.0.1
          placeholder: |
            192.168.1.10
            blog.example.com
            *.example.com
            https://your-domain.com

        - $formkit: checkbox
          name: enable_reading_progress
          value: true
          label: 开启阅读进度同步
          help: 允许前端上报并展示同页面其他用户的阅读进度。关闭后将不再发送阅读进度，也不会显示右侧圆点。

        - $formkit: number
          name: reading_progress_interval
          value: 5
          label: 阅读进度上报间隔
          help: 前端通过 WebSocket 定期发送阅读进度的时间间隔。单位：秒
          validation: required|number|min:2|max:60

        - $formkit: number
          name: rate_limit_interval
          value: 1
          label: 接口频率限制间隔
          help: 所有 HTTP API 的限流间隔。单位：秒/次。数值越大越省服务器资源，但数据更新越慢。
          validation: required|number|min:1|max:60
